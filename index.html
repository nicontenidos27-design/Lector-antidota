<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fase A — Ciencia del Energismo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F4EE;
  --cream-dark: #EDE8DC;
  --cream-mid: #F0EBE1;
  --gold: #C4973A;
  --gold-pale: #F0E4C4;
  --gold-faint: #FAF5E8;
  --ink: #1A1510;
  --ink-mid: #3D3020;
  --ink-soft: #6B5840;
  --ink-muted: #9A8870;
  --hl-yellow: rgba(255,220,80,0.45);
  --hl-gold: rgba(196,151,58,0.3);
  --hl-rose: rgba(220,100,80,0.25);
  --sidebar-w: 300px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Lora',Georgia,serif;min-height:100vh}

/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(247,244,238,0.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;gap:12px;padding:0 16px;height:56px}
.header-logo{font-family:'Playfair Display',serif;font-size:10px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;line-height:1.3;text-align:center;flex:1}
.header-logo span{display:block;font-size:14px;letter-spacing:.06em;color:var(--ink)}
.btn-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--cream-dark);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .2s;font-size:15px;flex-shrink:0}
.btn-icon:hover{background:var(--cream-dark)}
.btn-icon.active{background:var(--gold-faint);border-color:var(--gold);color:var(--gold)}

/* PROGRESS */
.progress-bar{position:fixed;top:56px;left:0;right:0;z-index:90;height:2px;background:var(--cream-dark)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#D4A94A);transition:width .1s;width:0}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:56px;bottom:0;width:var(--sidebar-w);background:var(--cream-mid);border-right:1px solid var(--cream-dark);overflow-y:auto;transition:transform .3s ease;z-index:50;display:flex;flex-direction:column}
.sidebar.hidden{transform:translateX(-100%)}
.sidebar-head{padding:16px 16px 12px;border-bottom:1px solid var(--cream-dark);position:sticky;top:0;background:var(--cream-mid);z-index:2}
.sidebar-label{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.sidebar-search{width:100%;padding:7px 12px;border:1px solid var(--cream-dark);border-radius:20px;background:var(--cream);font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);outline:none}
.sidebar-search:focus{border-color:var(--gold)}
.conf-list{padding:4px 0}
.conf-item{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .15s}
.conf-item:hover{background:var(--cream-dark)}
.conf-item.active{background:var(--gold-faint)}
.conf-item.active .conf-num{color:var(--gold)}
.conf-num{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--ink-muted);min-width:22px;padding-top:2px;flex-shrink:0}
.conf-name{font-family:'Lora',serif;font-size:13px;color:var(--ink-mid);line-height:1.4}
.conf-item.active .conf-name{color:var(--ink);font-weight:500}

/* READER */
.reader-wrap{margin-left:var(--sidebar-w);transition:margin-left .3s ease;padding:56px 24px 80px;display:flex;justify-content:center;min-height:100vh}
.reader-wrap.full{margin-left:0}
.reader-content{max-width:660px;width:100%;padding-top:36px}

.conf-header{margin-bottom:32px;padding-bottom:22px;border-bottom:1px solid var(--cream-dark)}
.conf-eyebrow{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.conf-title{font-family:'Playfair Display',serif;font-weight:600;line-height:1.25;color:var(--ink);font-size:28px}

/* TYPOGRAPHY — desktop */
.reader-body p{font-family:'Lora',serif;font-size:17px;color:var(--ink-mid);line-height:1.85;margin-bottom:1.35em}
.reader-body .sub-heading{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin:1.8em 0 .7em}

/* TYPOGRAPHY — mobile */
@media(max-width:768px){
  .conf-title{font-size:20px}
  .reader-body p{font-size:15px;line-height:1.75;margin-bottom:1.1em}
  .reader-body .sub-heading{font-size:10px;margin:1.4em 0 .6em}
  .reader-content{padding-top:24px}
  .conf-header{margin-bottom:22px;padding-bottom:16px}
}

/* ILLUSTRATIONS */
.illus-wrap{margin:1.8em auto;text-align:center;max-width:560px}
.illus-wrap img{max-width:100%;height:auto;border-radius:8px;box-shadow:0 3px 16px rgba(0,0,0,0.09);display:block;margin:0 auto}
@media(max-width:768px){
  .illus-wrap{margin:1.4em auto}
  .illus-wrap img{border-radius:6px}
}

/* HIGHLIGHTS */
mark{border-radius:2px;color:inherit}
mark.hl-y{background:var(--hl-yellow)}
mark.hl-g{background:var(--hl-gold)}
mark.hl-r{background:var(--hl-rose)}

/* TOOLBAR */
#toolbar{position:fixed;z-index:200;background:#1A1510;border-radius:10px;padding:5px 4px;display:none;flex-direction:row;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
#toolbar.show{display:flex}
.tb-btn{border:none;background:transparent;cursor:pointer;padding:6px 9px;border-radius:7px;color:white;font-size:12px;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.15)}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.y{background:#FFDC50}.dot.g{background:#C4973A}.dot.r{background:#DC6450}
.tb-sep{width:1px;background:rgba(255,255,255,.15);margin:3px 2px}

/* NOTES PANEL */
#notes-panel{position:fixed;right:0;top:56px;bottom:0;width:300px;background:var(--cream-mid);border-left:1px solid var(--cream-dark);z-index:80;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
#notes-panel.open{transform:translateX(0)}
.panel-head{padding:16px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink)}
.panel-close{border:none;background:transparent;cursor:pointer;color:var(--ink-muted);font-size:17px;padding:4px}
.panel-tabs{display:flex;border-bottom:1px solid var(--cream-dark)}
.panel-tab{flex:1;padding:9px 0;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);transition:all .2s}
.panel-tab.active{color:var(--gold);border-bottom:2px solid var(--gold);margin-bottom:-1px}
.panel-body{flex:1;overflow-y:auto;padding:12px}
.note-card{background:var(--cream);border:1px solid var(--cream-dark);border-left:3px solid var(--gold);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.note-text{font-family:'Lora',serif;font-size:13px;font-style:italic;color:var(--ink-mid);line-height:1.6;margin-bottom:6px}
.note-meta{font-family:'Inter',sans-serif;font-size:10px;color:var(--gold);letter-spacing:.04em}
.note-del{position:absolute;top:8px;right:8px;border:none;background:transparent;cursor:pointer;color:var(--ink-muted);font-size:13px;opacity:.4;line-height:1}
.note-del:hover{opacity:1;color:#dc6450}
.empty-msg{text-align:center;padding:32px 14px;color:var(--ink-muted);font-family:'Lora',serif;font-style:italic;font-size:13px;line-height:1.7}
.empty-msg .ico{font-size:26px;margin-bottom:10px;display:block}
.export-btn{width:100%;padding:10px;background:var(--gold-faint);border:1px solid var(--gold);border-radius:8px;color:var(--gold);font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .2s}
.export-btn:hover{background:var(--gold);color:white}

/* NAV */
.conf-nav{display:flex;justify-content:space-between;margin-top:40px;padding-top:22px;border-top:1px solid var(--cream-dark)}
.nav-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--cream-dark);background:transparent;padding:8px 16px;border-radius:24px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-soft);transition:all .2s}
.nav-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-faint)}
.nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
@media(max-width:768px){
  .nav-btn{font-size:12px;padding:7px 13px}
}

/* MOBILE LAYOUT */
@media(max-width:768px){
  :root{--sidebar-w:82vw}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .reader-wrap{margin-left:0!important;padding:56px 16px 80px}
  #notes-panel{width:100%}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:2px}
</style>
</head>
<body>

<header class="site-header">
  <button class="btn-icon" id="btn-sb" onclick="toggleSidebar()">☰</button>
  <div class="header-logo">Ciencia del<span>Energismo</span></div>
  <button class="btn-icon" id="btn-notes" onclick="toggleNotes()">◈</button>
</header>

<div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-label">Fase A — 50 Conferencias</div>
    <input class="sidebar-search" id="search" type="text" placeholder="Buscar…" oninput="renderList(this.value)">
  </div>
  <div class="conf-list" id="conf-list"></div>
</aside>

<div class="reader-wrap" id="reader-wrap">
  <div class="reader-content" id="reader-content">
    <p style="color:var(--ink-muted);font-family:'Inter',sans-serif;font-size:14px;padding-top:40px">Cargando contenido…</p>
  </div>
</div>

<div id="toolbar">
  <button class="tb-btn" onclick="applyHL('hl-y')"><span class="dot y"></span></button>
  <button class="tb-btn" onclick="applyHL('hl-g')"><span class="dot g"></span></button>
  <button class="tb-btn" onclick="applyHL('hl-r')"><span class="dot r"></span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveCit()">❝ Citar</button>
</div>

<div id="notes-panel">
  <div class="panel-head">
    <span class="panel-title">Mis notas</span>
    <button class="panel-close" onclick="toggleNotes()">✕</button>
  </div>
  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="cit" onclick="switchTab('cit')">Citas</button>
    <button class="panel-tab" data-tab="hl" onclick="switchTab('hl')">Subrayados</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div style="padding:0 12px 12px">
    <button class="export-btn" onclick="exportNotes()">↓ Exportar mis notas</button>
  </div>
</div>

<script src="contenido.js"></script>
<script>
var FULL_TOC = {
  1:"El Conocimiento de S\u00ed Mismo y Objetivos",2:"Qu\u00e9 es la Muerte",3:"El Desdoblamiento Astral",
  4:"Los Siete Centros de la M\u00e1quina Humana",5:"Las Dimensiones (I)",6:"Las Dimensiones (II)",
  7:"Las Conjuraciones",8:"Evoluci\u00f3n, Involuci\u00f3n y Revoluci\u00f3n",9:"Las Infradimensiones",
  10:"Los Siete Cuerpos",11:"C\u00f3mo se fabrica Alma y Esp\u00edritu",12:"Retorno y Recurrencia",
  13:"Leyes de Karma y Dharma",14:"Drogas y Alcoholismo",15:"Ego, Personalidad y Esencia",
  16:"La Observaci\u00f3n de S\u00ed Mismo",17:"Los Tres Factores para la Revoluci\u00f3n",
  18:"La Charla Interior",19:"Estados y Eventos",20:"El Pa\u00eds Psicol\u00f3gico",
  21:"Concentraci\u00f3n y Relajaci\u00f3n",22:"La Meditaci\u00f3n",23:"Fanatismo y Mitoman\u00eda",
  24:"La Vida y El Nivel del Ser",25:"Exoterismo y Esoterismo",26:"El Mundo de las Relaciones",
  27:"T\u00e9cnica para disolver el Yo",28:"El Cristo Universal e Individual",29:"La Ley del P\u00e9ndulo",
  30:"M\u00e9todo para Despertar la Conciencia",31:"Criaturas Mec\u00e1nicas",32:"El Cambio Radical",
  33:"Ley de Octavas y Entrop\u00eda",34:"El Centro de Gravedad Permanente",
  35:"La Familia y los Apegos",36:"Meditaci\u00f3n y Koanes",37:"El Saltito (Astral)",
  38:"El Dif\u00edcil Camino Cr\u00edstico",39:"La No-Identificaci\u00f3n",40:"El Sacrificio por la Humanidad",
  41:"La Danza de los Derviches",42:"Dos clases de Conocimiento",43:"Yoes Lujuriosos",
  44:"El Yo de la Traici\u00f3n",45:"Qu\u00e9 hacer para que las pr\u00e1cticas den resultados",
  46:"C\u00f3mo controlar poluciones nocturnas",47:"El Yo de la Brujer\u00eda",
  48:"Pronunciaci\u00f3n de Mantrams",49:"La Dualidad",50:"El Origen del Ego"
};

// Image placements: conf_num -> [[after_block_index, filename], ...]
var PLACEMENTS = {
  1:  [[1,"conf01_01.jpg"],[6,"conf01_02.jpg"]],
  3:  [[2,"conf03_01.jpg"]],
  4:  [[1,"conf04_01.jpg"],[3,"conf04_02.jpg"],[5,"conf04_03.jpg"]],
  7:  [[1,"conf07_01.jpg"]],
  8:  [[2,"conf08_01.jpg"]],
  9:  [[2,"conf09_01.jpg"]],
  10: [[2,"conf10_01.jpg"]],
  11: [[1,"conf11_01.jpg"],[3,"conf11_02.jpg"],[5,"conf11_03.jpg"]],
  13: [[1,"conf13_01.jpg"]],
  17: [[2,"conf17_01.jpg"]],
  21: [[2,"conf21_01.jpg"]],
  27: [[2,"conf27_01.jpg"],[4,"conf27_02.jpg"]],
  28: [[1,"conf28_01.jpg"]],
  30: [[2,"conf30_01.jpg"]],
  33: [[2,"conf33_01.jpg"]],
  38: [[2,"conf38_01.jpg"]],
  49: [[1,"conf49_01.jpg"],[2,"conf49_02.jpg"],[3,"conf49_03.jpg"],[4,"conf49_04.jpg"],[5,"conf49_05.jpg"],[6,"conf49_06.jpg"]],
  50: [[1,"conf50_01.jpg"],[3,"conf50_02.jpg"],[5,"conf50_03.jpg"]]
};

var IMGS_PATH = 'imgs/';
var currentIdx = 0;
var currentTab = 'cit';
var citations  = JSON.parse(localStorage.getItem('energ_cits') || '[]');
var highlights = JSON.parse(localStorage.getItem('energ_hls')  || '[]');
var selRange   = null;
var sidebarOpen = window.innerWidth > 768;

var confByNum = {};
CONFERENCES.forEach(function(c,i){ confByNum[c.num]=i; });

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SIDEBAR ──
function renderList(filter){
  var list = document.getElementById('conf-list');
  list.innerHTML = '';
  var f = (filter||'').toLowerCase();
  for(var n=1;n<=50;n++){
    var title = FULL_TOC[n]||('Conferencia '+n);
    if(f && title.toLowerCase().indexOf(f)===-1 && String(n).indexOf(f)===-1) continue;
    var idx = confByNum[n];
    var avail = idx!==undefined;
    var btn = document.createElement('button');
    btn.className='conf-item'+(CONFERENCES[currentIdx]&&CONFERENCES[currentIdx].num===n?' active':'');
    if(!avail){btn.style.opacity='0.3';btn.disabled=true;}
    btn.innerHTML='<span class="conf-num">'+String(n).padStart(2,'0')+'</span><span class="conf-name">'+esc(title)+'</span>';
    if(avail)(function(i){btn.onclick=function(){loadConf(i);if(window.innerWidth<=768)toggleSidebar(false);};})(idx);
    list.appendChild(btn);
  }
}

function toggleSidebar(force){
  sidebarOpen = force!==undefined ? force : !sidebarOpen;
  var sb=document.getElementById('sidebar');
  var rw=document.getElementById('reader-wrap');
  if(window.innerWidth<=768){
    sb.classList.toggle('open',sidebarOpen);
  } else {
    sb.classList.toggle('hidden',!sidebarOpen);
    rw.classList.toggle('full',!sidebarOpen);
  }
  document.getElementById('btn-sb').classList.toggle('active',sidebarOpen);
}

// ── LOAD CONFERENCE ──
function loadConf(idx){
  currentIdx = idx;
  var conf = CONFERENCES[idx];
  var placements = PLACEMENTS[conf.num] || [];

  // Build a lookup: after which block index to insert each image
  var imgAfter = {};
  placements.forEach(function(p){ imgAfter[p[0]] = p[1]; });

  var html = '';
  for(var i=0;i<conf.blocks.length;i++){
    var b = conf.blocks[i];
    if(b.type==='heading'){
      html += '<div class="sub-heading">'+esc(b.text)+'</div>';
    } else {
      html += '<p>'+esc(b.text)+'</p>';
    }
    if(imgAfter[i]){
      html += '<div class="illus-wrap"><img src="'+IMGS_PATH+imgAfter[i]+'" alt="Ilustraci\u00f3n" loading="lazy"></div>';
    }
  }

  var prev = idx>0
    ? '<button class="nav-btn" onclick="loadConf('+(idx-1)+')">&#8592; Anterior</button>'
    : '<button class="nav-btn" disabled>&#8592; Anterior</button>';
  var next = idx<CONFERENCES.length-1
    ? '<button class="nav-btn" onclick="loadConf('+(idx+1)+')">Siguiente &#8594;</button>'
    : '<button class="nav-btn" disabled>Siguiente &#8594;</button>';

  document.getElementById('reader-content').innerHTML =
    '<div class="conf-header">'+
      '<div class="conf-eyebrow">Conferencia '+String(conf.num).padStart(2,'0')+' \u00b7 Fase A</div>'+
      '<h1 class="conf-title">'+esc(conf.title)+'</h1>'+
    '</div>'+
    '<div class="reader-body" id="reader-body">'+html+'</div>'+
    '<nav class="conf-nav">'+prev+next+'</nav>';

  window.scrollTo(0,0);
  renderList(document.getElementById('search').value);
}

// ── SELECTION TOOLBAR ──
document.addEventListener('mouseup',function(e){
  if(e.target.closest('#toolbar')||e.target.closest('#notes-panel')) return;
  setTimeout(function(){
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed||sel.toString().trim().length<3){hideBar();return;}
    var body=document.getElementById('reader-body');
    if(!body||!body.contains(sel.anchorNode)){hideBar();return;}
    selRange=sel.getRangeAt(0).cloneRange();
    showBar(sel);
  },10);
});
document.addEventListener('touchend',function(e){
  if(e.target.closest('#toolbar')||e.target.closest('#notes-panel')) return;
  setTimeout(function(){
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed||sel.toString().trim().length<3) return;
    var body=document.getElementById('reader-body');
    if(!body||!body.contains(sel.anchorNode)) return;
    selRange=sel.getRangeAt(0).cloneRange();
    showBar(sel);
  },200);
});
document.addEventListener('mousedown',function(e){
  if(!e.target.closest('#toolbar')) hideBar();
});

function showBar(sel){
  var tb=document.getElementById('toolbar');
  var rect=sel.getRangeAt(0).getBoundingClientRect();
  var left=Math.max(6,Math.min(rect.left+rect.width/2-110,window.innerWidth-226));
  var top=rect.top+window.scrollY-52;
  if(top<66) top=rect.bottom+window.scrollY+8;
  tb.style.left=left+'px';
  tb.style.top=top+'px';
  tb.classList.add('show');
}
function hideBar(){document.getElementById('toolbar').classList.remove('show');selRange=null;}

function applyHL(cls){
  if(!selRange) return;
  var text=selRange.toString().trim();
  if(!text) return;
  try{
    var mark=document.createElement('mark');
    mark.className=cls;
    mark.dataset.hid=Date.now();
    selRange.surroundContents(mark);
    saveHL(mark.dataset.hid,cls,text);
  }catch(e){ saveHL(Date.now(),cls,text); }
  window.getSelection().removeAllRanges();
  hideBar();
  if(currentTab==='hl') renderPanel();
}
function saveHL(id,cls,text){
  highlights.unshift({id:+id,conf:CONFERENCES[currentIdx].num,text:text,cls:cls});
  localStorage.setItem('energ_hls',JSON.stringify(highlights));
}
function saveCit(){
  if(!selRange) return;
  var text=selRange.toString().trim();
  if(!text) return;
  var conf=CONFERENCES[currentIdx];
  citations.unshift({id:Date.now(),conf:conf.num,title:conf.title,text:text});
  localStorage.setItem('energ_cits',JSON.stringify(citations));
  window.getSelection().removeAllRanges();
  hideBar();
  var nb=document.getElementById('btn-notes');
  nb.classList.add('active');
  setTimeout(function(){nb.classList.remove('active');},1500);
  if(document.getElementById('notes-panel').classList.contains('open')) renderPanel();
}

// ── NOTES PANEL ──
function toggleNotes(){
  var p=document.getElementById('notes-panel');
  var open=!p.classList.contains('open');
  p.classList.toggle('open',open);
  if(open) renderPanel();
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.panel-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  renderPanel();
}
function renderPanel(){
  var body=document.getElementById('panel-body');
  var c2col={'hl-y':'#FFDC50','hl-g':'#C4973A','hl-r':'#DC6450'};
  if(currentTab==='cit'){
    if(!citations.length){body.innerHTML='<div class="empty-msg"><span class="ico">\u275d</span>Seleccion\u00e1 texto y toc\u00e1 \u201cCitar\u201d para guardar fragmentos.</div>';return;}
    body.innerHTML=citations.map(function(c){
      return '<div class="note-card"><div class="note-text">\u201c'+esc(c.text)+'\u201d</div><div class="note-meta">Conf. '+String(c.conf).padStart(2,'0')+' \u00b7 '+esc(c.title)+'</div><button class="note-del" onclick="delCit('+c.id+')">&#10005;</button></div>';
    }).join('');
  } else {
    if(!highlights.length){body.innerHTML='<div class="empty-msg"><span class="ico">\uD83D\uDD8A</span>Subray\u00e1 texto con los colores disponibles.</div>';return;}
    body.innerHTML=highlights.map(function(h){
      return '<div class="note-card" style="border-left-color:'+(c2col[h.cls]||'#C4973A')+'"><div class="note-text">'+esc(h.text)+'</div><div class="note-meta">Conf. '+String(h.conf).padStart(2,'0')+'</div><button class="note-del" onclick="delHL('+h.id+')">&#10005;</button></div>';
    }).join('');
  }
}
function delCit(id){citations=citations.filter(function(c){return c.id!==id;});localStorage.setItem('energ_cits',JSON.stringify(citations));renderPanel();}
function delHL(id){
  highlights=highlights.filter(function(h){return h.id!==id;});
  localStorage.setItem('energ_hls',JSON.stringify(highlights));
  var el=document.querySelector('mark[data-hid="'+id+'"]');
  if(el){var p=el.parentNode;while(el.firstChild)p.insertBefore(el.firstChild,el);p.removeChild(el);}
  renderPanel();
}

// ── PROGRESS ──
window.addEventListener('scroll',function(){
  var d=document.documentElement;
  var pct=d.scrollHeight-d.clientHeight>0?(d.scrollTop/(d.scrollHeight-d.clientHeight)*100):0;
  document.getElementById('prog').style.width=pct+'%';
},{passive:true});

// ── EXPORT ──
function exportNotes(){
  var out='== MIS NOTAS \u2014 CIENCIA DEL ENERGISMO \u2014 FASE A ==\n\n';
  if(citations.length){out+='\u2014 CITAS \u2014\n\n';citations.forEach(function(c){out+='[Conf.'+c.conf+' \u00b7 '+c.title+']\n\u201c'+c.text+'\u201d\n\n';});}
  if(highlights.length){out+='\u2014 SUBRAYADOS \u2014\n\n';highlights.forEach(function(h){out+='[Conf.'+h.conf+'] '+h.text+'\n\n';});}
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([out],{type:'text/plain;charset=utf-8'}));
  a.download='mis-notas-energismo.txt';
  a.click();
}

// ── INIT ──
if(window.innerWidth>768){
  document.getElementById('sidebar').classList.remove('hidden');
} else {
  document.getElementById('reader-wrap').classList.add('full');
}
renderList('');
loadConf(0);
</script>
