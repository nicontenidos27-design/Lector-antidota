<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fase A — Ciencia del Energismo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #111008;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: Georgia, serif;
  touch-action: pan-y;
}

/* ── STAGE: casi toda la pantalla ── */
#stage {
  position: relative;
  width: 100vw;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#canvas-wrap {
  position: relative;
  /* size set by JS */
}

canvas {
  display: block;
  border-radius: 2px;
}

#page-canvas {
  box-shadow:
    0 0 0 1px rgba(180,150,90,0.15),
    2px 4px 24px rgba(0,0,0,0.6),
    6px 8px 48px rgba(0,0,0,0.4);
}

/* ── FLIP CANVAS on top ── */
#flip-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

/* ── CONTROLS overlay ── */
#controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  z-index: 20;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.btn-nav {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(196,151,58,0.35);
  background: rgba(0,0,0,0.4);
  color: #C4973A;
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
  -webkit-user-select: none;
}
.btn-nav:active { background: rgba(196,151,58,0.2); }
.btn-nav:disabled { opacity: 0.2; pointer-events: none; }

#page-info {
  font-size: 11px;
  color: rgba(240,220,170,0.5);
  letter-spacing: 0.1em;
  min-width: 80px;
  text-align: center;
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(196,151,58,0.12);
  z-index: 20;
}
#progress-fill {
  height: 100%;
  background: #C4973A;
  width: 0;
  transition: width 0.25s ease;
}

/* ── HEADER (minimal) ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(rgba(0,0,0,0.65), transparent);
  z-index: 20;
  pointer-events: none;
}
#header span {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(196,151,58,0.6);
}

/* ── LOADER ── */
#loader {
  position: fixed; inset: 0;
  background: #111008;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.6s;
}
#loader.out { opacity: 0; pointer-events: none; }
#loader h1 { color: #C4973A; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; font-weight: normal; }
#loader h2 { color: #f0e8d8; font-size: 20px; letter-spacing: 0.06em; margin-bottom: 28px; font-weight: normal; }
#lbar { width: 180px; height: 2px; background: rgba(196,151,58,0.15); border-radius: 2px; overflow: hidden; }
#lfill { height: 100%; background: #C4973A; width: 0; transition: width 0.3s; }
#ltxt { margin-top: 14px; color: rgba(240,220,170,0.35); font-size: 12px; letter-spacing: 0.05em; }

/* ── TAP ZONES ── */
#tap-prev, #tap-next {
  position: fixed;
  top: 38px; bottom: 52px;
  width: 28%;
  z-index: 10;
  cursor: pointer;
}
#tap-prev { left: 0; }
#tap-next { right: 0; }
</style>
</head>
<body>

<div id="loader">
  <h1>Ciencia del</h1>
  <h2>Energismo</h2>
  <div id="lbar"><div id="lfill"></div></div>
  <div id="ltxt">Cargando libro…</div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="header"><span>Ciencia del Energismo · Fase A</span></div>

<div id="stage">
  <div id="canvas-wrap">
    <canvas id="page-canvas"></canvas>
    <canvas id="flip-canvas"></canvas>
  </div>
</div>

<div id="tap-prev" onclick="goTo(currentPage-1)"></div>
<div id="tap-next" onclick="goTo(currentPage+1)"></div>

<div id="controls">
  <button class="btn-nav" id="btn-prev" onclick="goTo(currentPage-1)">&#8592;</button>
  <div id="page-info">— / —</div>
  <button class="btn-nav" id="btn-next" onclick="goTo(currentPage+1)">&#8594;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var PDF_URL = 'Fase_A.pdf';
var pdfDoc = null;
var currentPage = 1;
var totalPages = 0;
var busy = false;
var currentScale = 1;

var pageCanvas  = document.getElementById('page-canvas');
var pageCtx     = pageCanvas.getContext('2d');
var flipCanvas  = document.getElementById('flip-canvas');
var flipCtx     = flipCanvas.getContext('2d');
var wrap        = document.getElementById('canvas-wrap');

// ── LOAD ──
var fakeP = 0;
var fakeT = setInterval(function(){
  fakeP = Math.min(fakeP + Math.random()*12, 88);
  document.getElementById('lfill').style.width = fakeP+'%';
}, 220);

pdfjsLib.getDocument(PDF_URL).promise.then(function(doc){
  clearInterval(fakeT);
  document.getElementById('lfill').style.width = '100%';
  pdfDoc = doc;
  totalPages = doc.numPages;
  renderPage(1, null, function(){
    document.getElementById('loader').classList.add('out');
  });
}).catch(function(e){
  document.getElementById('ltxt').textContent = 'Error: verificá que el archivo se llame Fase_A.pdf';
});

// ── COMPUTE SCALE ──
function computeViewport(page) {
  var vp = page.getViewport({ scale: 1 });
  var stageW = window.innerWidth;
  var stageH = window.innerHeight - 52; // minus controls
  var scaleW = stageW / vp.width;
  var scaleH = stageH / vp.height;
  var scale  = Math.min(scaleW, scaleH) * 0.98;
  return page.getViewport({ scale: scale });
}

// ── RENDER ──
var activeRender = null;
function renderPage(num, direction, cb) {
  pdfDoc.getPage(num).then(function(page){
    var vp = computeViewport(page);
    currentScale = vp.scale;

    pageCanvas.width  = vp.width;
    pageCanvas.height = vp.height;
    flipCanvas.width  = vp.width;
    flipCanvas.height = vp.height;

    wrap.style.width  = vp.width  + 'px';
    wrap.style.height = vp.height + 'px';

    // Draw page background
    pageCtx.fillStyle = '#FBF8F0';
    pageCtx.fillRect(0, 0, vp.width, vp.height);

    if(activeRender) { activeRender.cancel(); }
    activeRender = page.render({ canvasContext: pageCtx, viewport: vp });
    activeRender.promise.then(function(){
      activeRender = null;
      addDepth();
      updateUI(num);
      if(cb) cb();
    }).catch(function(e){ if(e.name!=='RenderingCancelledException') console.warn(e); });
  });
}

function addDepth() {
  // Right edge shadow
  var g = pageCtx.createLinearGradient(pageCanvas.width-16,0,pageCanvas.width,0);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.08)');
  pageCtx.fillStyle = g;
  pageCtx.fillRect(pageCanvas.width-16,0,16,pageCanvas.height);
}

// ── PAGE FLIP ANIMATION (realistic curl) ──
function animateFlip(direction, cb) {
  // Snapshot current page
  var snap = document.createElement('canvas');
  snap.width  = pageCanvas.width;
  snap.height = pageCanvas.height;
  snap.getContext('2d').drawImage(pageCanvas, 0, 0);

  var duration = 480;
  var start = null;
  var dir = direction === 'next' ? -1 : 1; // -1 = curl from right, 1 = curl from left

  function frame(ts) {
    if(!start) start = ts;
    var t = Math.min((ts - start) / duration, 1);
    var ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

    flipCtx.clearRect(0, 0, flipCanvas.width, flipCanvas.height);

    var W = flipCanvas.width;
    var H = flipCanvas.height;

    if(ease < 1) {
      // The page that's turning away
      // Simulate a fold: split page at fold line
      // Fold line moves from edge to center
      var foldX = dir === -1
        ? W * (1 - ease)       // right→center
        : W * ease;            // left→center

      // Draw the static (not yet turning) part
      flipCtx.save();
      if(dir === -1) {
        // clip left of fold
        flipCtx.beginPath();
        flipCtx.rect(0, 0, foldX, H);
        flipCtx.clip();
      } else {
        // clip right of fold
        flipCtx.beginPath();
        flipCtx.rect(foldX, 0, W - foldX, H);
        flipCtx.clip();
      }
      flipCtx.drawImage(snap, 0, 0);
      flipCtx.restore();

      // Draw the folded part (compressed + darkened = curl illusion)
      var foldW = dir === -1 ? (W - foldX) : foldX;
      if(foldW > 1) {
        flipCtx.save();
        flipCtx.globalAlpha = 1 - ease * 0.5;

        // Perspective squish
        var squish = 1 - ease * 0.85;
        if(dir === -1) {
          flipCtx.translate(foldX, 0);
          flipCtx.scale(-squish, 1);
          flipCtx.drawImage(
            snap,
            foldX, 0, W - foldX, H,
            0, 0, W - foldX, H
          );
        } else {
          flipCtx.translate(foldX, 0);
          flipCtx.scale(squish, 1);
          flipCtx.drawImage(
            snap,
            0, 0, foldX, H,
            -(foldX), 0, foldX, H
          );
        }
        flipCtx.restore();

        // Curl shadow
        flipCtx.save();
        var shadowW = Math.min(foldW * 0.4, 30);
        var shadowX = dir === -1 ? foldX - shadowW : foldX;
        var sg = flipCtx.createLinearGradient(shadowX, 0, shadowX + shadowW * (dir === -1 ? -1 : 1), 0);
        sg.addColorStop(0, 'rgba(0,0,0,0.0)');
        sg.addColorStop(0.5, 'rgba(0,0,0,0.18)');
        sg.addColorStop(1, 'rgba(0,0,0,0.0)');
        flipCtx.fillStyle = sg;
        flipCtx.fillRect(
          dir === -1 ? foldX - shadowW : foldX,
          0, shadowW, H
        );
        flipCtx.restore();
      }
    }

    if(t < 1) {
      requestAnimationFrame(frame);
    } else {
      flipCtx.clearRect(0, 0, flipCanvas.width, flipCanvas.height);
      if(cb) cb();
    }
  }
  requestAnimationFrame(frame);
}

// ── NAVIGATE ──
function goTo(num) {
  if(!pdfDoc || busy) return;
  if(num < 1 || num > totalPages) return;
  busy = true;
  var dir = num > currentPage ? 'next' : 'prev';
  var target = num;
  currentPage = num;

  animateFlip(dir, function(){
    renderPage(target, dir, function(){
      busy = false;
    });
  });
}

function updateUI(num) {
  document.getElementById('page-info').textContent = num + ' / ' + totalPages;
  document.getElementById('btn-prev').disabled = num <= 1;
  document.getElementById('btn-next').disabled = num >= totalPages;
  var pct = totalPages > 1 ? (num-1)/(totalPages-1)*100 : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  if(num < totalPages) pdfDoc.getPage(num+1); // preload
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); goTo(currentPage+1); }
  if(e.key==='ArrowLeft'){ e.preventDefault(); goTo(currentPage-1); }
});

// ── SWIPE ──
var tx = 0, ty = 0, dragging = false;
document.addEventListener('touchstart', function(e){
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  dragging = true;
}, {passive:true});
document.addEventListener('touchend', function(e){
  if(!dragging) return;
  dragging = false;
  var dx = e.changedTouches[0].clientX - tx;
  var dy = e.changedTouches[0].clientY - ty;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36) {
    if(dx < 0) goTo(currentPage+1);
    else goTo(currentPage-1);
  }
}, {passive:true});

// ── RESIZE ──
var resizeTimer;
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){
    if(pdfDoc) renderPage(currentPage, null, null);
  }, 200);
});
</script>
</body>
</html>
