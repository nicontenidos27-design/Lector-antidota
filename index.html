<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fase A — Ciencia del Energismo</title>
<style>
  :root {
    --cream: #F7F4EE;
    --cream-dark: #EDE8DC;
    --gold: #C4973A;
    --ink: #1A1510;
    --ink-muted: #9A8870;
    --shadow: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1208;
    background-image:
      radial-gradient(ellipse at 50% 0%, #2e1f0a 0%, #1a1208 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(196,151,58,0.2);
    position: relative;
  }
  .header-title {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    line-height: 1.5;
  }
  .header-title span {
    display: block;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: #f0e8d8;
  }

  /* ── BOOK STAGE ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    width: 100%;
  }

  .book-wrap {
    position: relative;
    width: min(560px, 92vw);
    /* Height set by JS based on PDF page ratio */
  }

  /* Canvas layers */
  .page-canvas {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 3px;
  }

  /* Page flip overlay */
  .flip-container {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  /* Book shadow */
  .book-shadow {
    position: absolute;
    bottom: -18px;
    left: 5%; right: 5%;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
    filter: blur(6px);
  }

  /* Page curl effect canvas */
  #flip-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px 24px;
    width: 100%;
    justify-content: center;
  }

  .btn-nav {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(196,151,58,0.4);
    background: rgba(196,151,58,0.08);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-nav:hover { background: rgba(196,151,58,0.18); border-color: var(--gold); }
  .btn-nav:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

  .page-info {
    font-size: 12px;
    color: rgba(240,232,216,0.55);
    letter-spacing: 0.1em;
    min-width: 90px;
    text-align: center;
    font-family: 'Georgia', serif;
  }

  /* Progress dots */
  .progress-track {
    position: relative;
    width: min(560px, 92vw);
    height: 2px;
    background: rgba(196,151,58,0.15);
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .progress-thumb {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── LOADING ── */
  .loader {
    position: fixed;
    inset: 0;
    background: #1a1208;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-title {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .loader-sub {
    color: #f0e8d8;
    font-size: 18px;
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }
  .loader-bar {
    width: 200px; height: 2px;
    background: rgba(196,151,58,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-fill {
    height: 100%;
    background: var(--gold);
    width: 0;
    transition: width 0.3s;
  }
  .loader-text {
    margin-top: 14px;
    color: rgba(240,232,216,0.4);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  /* ── THUMBNAIL STRIP (opcional) ── */
  .thumb-toggle {
    position: fixed;
    bottom: 90px;
    right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(196,151,58,0.3);
    background: rgba(26,18,8,0.8);
    color: var(--gold);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }

  /* page turn animation overlay */
  .turning {
    animation: pageTurn 0.45s ease-in-out;
  }
  @keyframes pageTurn {
    0%   { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
    40%  { transform: perspective(1200px) rotateY(-25deg); opacity: 0.7; }
    100% { transform: perspective(1200px) rotateY(0deg); opacity: 1; }
  }

  /* Swipe hint */
  .swipe-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(240,232,216,0.25);
    letter-spacing: 0.08em;
    pointer-events: none;
    transition: opacity 1s;
  }
  .swipe-hint.hidden { opacity: 0; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-title">Ciencia del</div>
  <div class="loader-sub">Energismo</div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-text" id="loader-text">Cargando libro…</div>
</div>

<header class="header">
  <div class="header-title">
    Ciencia del <span>Energismo</span>
  </div>
</header>

<div class="stage">
  <div class="book-wrap" id="book-wrap">
    <canvas id="page-canvas" class="page-canvas"></canvas>
    <canvas id="flip-canvas"></canvas>
    <div class="book-shadow"></div>
  </div>
</div>

<div class="progress-track" id="progress-track">
  <div class="progress-thumb" id="progress-thumb"></div>
</div>

<div class="controls">
  <button class="btn-nav" id="btn-prev" onclick="flipTo(currentPage - 1)">&#8592;</button>
  <div class="page-info" id="page-info">— / —</div>
  <button class="btn-nav" id="btn-next" onclick="flipTo(currentPage + 1)">&#8594;</button>
</div>

<div class="swipe-hint" id="swipe-hint">Deslizá para pasar la página</div>

<!-- PDF.js desde CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ── CONFIG ──
const PDF_URL = 'Fase_A.pdf';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
var pdfDoc = null;
var currentPage = 1;
var totalPages = 0;
var isFlipping = false;
var renderTask = null;

var canvas = document.getElementById('page-canvas');
var ctx = canvas.getContext('2d');
var flipCanvas = document.getElementById('flip-canvas');
var flipCtx = flipCanvas.getContext('2d');

// ── LOAD PDF ──
pdfjsLib.getDocument(PDF_URL).promise.then(function(doc) {
  pdfDoc = doc;
  totalPages = doc.numPages;
  document.getElementById('loader-text').textContent = 'Preparando página 1…';
  renderPage(1, false, function() {
    document.getElementById('loader').classList.add('hidden');
    hideSwipeHint();
  });
}).catch(function(err) {
  document.getElementById('loader-text').textContent = 'Error al cargar el PDF. Verificá que el archivo se llame Fase_A.pdf';
  console.error(err);
});

// ── RENDER PAGE ──
function renderPage(num, animate, callback) {
  if(!pdfDoc) return;
  if(renderTask) { renderTask.cancel(); }

  pdfDoc.getPage(num).then(function(page) {
    var wrap = document.getElementById('book-wrap');
    var maxW = wrap.clientWidth;

    var viewport = page.getViewport({ scale: 1 });
    var scale = maxW / viewport.width;
    var scaledVP = page.getViewport({ scale: scale });

    canvas.width  = scaledVP.width;
    canvas.height = scaledVP.height;
    flipCanvas.width  = scaledVP.width;
    flipCanvas.height = scaledVP.height;
    wrap.style.height = scaledVP.height + 'px';

    // If animating, snapshot current page first
    if(animate) {
      var snap = document.createElement('canvas');
      snap.width = canvas.width;
      snap.height = canvas.height;
      snap.getContext('2d').drawImage(canvas, 0, 0);
      runFlipAnimation(snap, function() {
        doRender(page, scaledVP, callback);
      });
    } else {
      doRender(page, scaledVP, callback);
    }

    updateUI(num);
  });
}

function doRender(page, viewport, callback) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Page background
  ctx.fillStyle = '#FDFAF4';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle page border
  ctx.strokeStyle = 'rgba(180,160,120,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, canvas.width-1, canvas.height-1);

  renderTask = page.render({
    canvasContext: ctx,
    viewport: viewport
  });

  renderTask.promise.then(function() {
    renderTask = null;
    // Add subtle page texture overlay
    addPageTexture();
    if(callback) callback();
  }).catch(function(e) {
    if(e.name !== 'RenderingCancelledException') console.error(e);
  });
}

function addPageTexture() {
  // Subtle right-edge shadow to give depth
  var grad = ctx.createLinearGradient(canvas.width - 20, 0, canvas.width, 0);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.06)');
  ctx.fillStyle = grad;
  ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);

  // Top edge
  var gradTop = ctx.createLinearGradient(0, 0, 0, 8);
  gradTop.addColorStop(0, 'rgba(0,0,0,0.04)');
  gradTop.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradTop;
  ctx.fillRect(0, 0, canvas.width, 8);
}

// ── FLIP ANIMATION ──
function runFlipAnimation(snapCanvas, callback) {
  var duration = 420;
  var start = null;
  flipCanvas.style.opacity = 1;

  function animate(ts) {
    if(!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    var ease = easeInOut(progress);

    flipCtx.clearRect(0, 0, flipCanvas.width, flipCanvas.height);

    // Simulate page curl: squish horizontally + fade
    var scaleX = 1 - ease;
    var alpha = 1 - ease;

    flipCtx.save();
    flipCtx.globalAlpha = alpha;
    flipCtx.translate(flipCanvas.width / 2, 0);
    flipCtx.scale(scaleX, 1);
    flipCtx.translate(-flipCanvas.width / 2, 0);
    flipCtx.drawImage(snapCanvas, 0, 0);

    // Page curl shadow on the left side
    if(scaleX > 0.1) {
      var shadowW = (1 - scaleX) * 40;
      var grad = flipCtx.createLinearGradient(0, 0, shadowW, 0);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.15)');
      flipCtx.globalAlpha = alpha * 0.6;
      flipCtx.fillStyle = grad;
      flipCtx.fillRect(0, 0, shadowW, flipCanvas.height);
    }

    flipCtx.restore();

    if(progress < 1) {
      requestAnimationFrame(animate);
    } else {
      flipCtx.clearRect(0, 0, flipCanvas.width, flipCanvas.height);
      flipCanvas.style.opacity = 0;
      if(callback) callback();
    }
  }
  requestAnimationFrame(animate);
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

// ── NAVIGATION ──
function flipTo(num) {
  if(!pdfDoc || isFlipping) return;
  if(num < 1 || num > totalPages) return;
  isFlipping = true;
  var animate = Math.abs(num - currentPage) === 1; // only animate single page turns
  currentPage = num;
  renderPage(num, animate, function() {
    isFlipping = false;
  });
}

function updateUI(num) {
  document.getElementById('page-info').textContent =
    'Página ' + num + ' de ' + totalPages;
  document.getElementById('btn-prev').disabled = num <= 1;
  document.getElementById('btn-next').disabled = num >= totalPages;
  var pct = totalPages > 1 ? ((num-1)/(totalPages-1)*100) : 0;
  document.getElementById('progress-thumb').style.width = pct + '%';
  // Preload next page
  if(num < totalPages) pdfDoc.getPage(num + 1);
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    flipTo(currentPage + 1);
  }
  if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    flipTo(currentPage - 1);
  }
});

// ── TOUCH SWIPE ──
var touchStartX = 0;
var touchStartY = 0;
document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if(dx < 0) flipTo(currentPage + 1);
    else flipTo(currentPage - 1);
  }
}, {passive: true});

// ── CLICK ZONES ── (tap left half = prev, right half = next)
canvas.addEventListener('click', function(e) {
  var x = e.offsetX / canvas.offsetWidth;
  if(x < 0.35) flipTo(currentPage - 1);
  else if(x > 0.65) flipTo(currentPage + 1);
});

// ── PROGRESS BAR CLICK ──
document.getElementById('progress-track').addEventListener('click', function(e) {
  var rect = this.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  var target = Math.round(1 + pct * (totalPages - 1));
  flipTo(target);
});

// ── SWIPE HINT ──
var hintHidden = false;
function hideSwipeHint() {
  setTimeout(function() {
    document.getElementById('swipe-hint').classList.add('hidden');
    hintHidden = true;
  }, 3000);
}

// ── LOADING PROGRESS SIMULATION ──
var fakeProgress = 0;
var fakeInterval = setInterval(function() {
  fakeProgress = Math.min(fakeProgress + Math.random() * 15, 85);
  document.getElementById('loader-fill').style.width = fakeProgress + '%';
  if(fakeProgress >= 85) clearInterval(fakeInterval);
}, 200);
</script>
</body>
</html>
